packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

catalog:
  "@tanstack/react-query": ^5.101.2
  "@types/node": ^26.1.1
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vanilla-extract/vite-plugin": ^5.2.4
  autoprefixer: ^10.5.2
  oxfmt: ^0.58.0
  oxlint: ^1.73.0
  postcss: ^8.5.16
  postcss-prefix-selector: ^2.1.1
  react: ^19.2.7
  react-dom: ^19.2.7
  tsdown: ^0.22.4
  typescript: ^6.0.3
  viem: ^2.55.0
  vite: ^8.1.4
  wagmi: ^3.7.1

overrides:
  "@types/react": "catalog:"
  "@types/react-dom": "catalog:"
  "@types/node": "catalog:"
  "react": "catalog:"
  "react-dom": "catalog:"
  "typescript": "catalog:"
  "abitype>zod": "-"
  "react-native": "-"
  "@solana/connector>@solana/connector-debugger": "-"
  "@solana/connector>@solana/keychain": "-"
  "@solana/connector>@solana/keychain-aws-kms": "-"
  "@solana/connector>@solana/keychain-fireblocks": "-"
  "@solana/connector>@solana/keychain-privy": "-"
  "@solana/connector>@solana/keychain-turnkey": "-"
  "@solana/connector>@solana/keychain-vault": "-"
  "@solana/connector>@walletconnect/universal-provider": "-"

packageExtensions:
  "@solana/connector@*":
    peerDependenciesMeta:
      "@solana/connector-debugger":
        optional: true
      "@solana/keychain":
        optional: true
      "@solana/keychain-aws-kms":
        optional: true
      "@solana/keychain-fireblocks":
        optional: true
      "@solana/keychain-privy":
        optional: true
      "@solana/keychain-turnkey":
        optional: true
      "@solana/keychain-vault":
        optional: true
      "@solana/web3.js":
        optional: true
      "@walletconnect/universal-provider":
        optional: true

catalogMode: manual
strictDepBuilds: false

allowBuilds:
  "@reown/appkit": false
  bufferutil: false
  esbuild: false
  protobufjs: false
  sharp: false
  utf-8-validate: false
